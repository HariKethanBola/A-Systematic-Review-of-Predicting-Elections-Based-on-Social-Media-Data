{% extends 'base.html' %}
{% load static %}

{% block title %}User Registration - Election Prediction{% endblock %}

{% block extra_css %}
<style>
    body {
        background-color: #e9ecef;
    }
</style>
{% endblock %}

{% block content %}
<div class="card auth-card" style="max-width: 600px;">
    <div class="auth-header">
        <h2>Create Account</h2>
        <p class="text-muted">Register for Election Prediction System</p>
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" class="form-control" required>
        </div>

        <div class="row">
            <div class="col-md-6 form-group">
                <label for="phoneno">Phone Number</label>
                <input type="text" name="phoneno" id="phoneno" class="form-control" required>
            </div>
            <div class="col-md-6 form-group">
                <label for="city">City</label>
                <input type="text" name="city" id="city" class="form-control" required>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 form-group">
                <label for="state">State</label>
                <input type="text" name="state" id="state" class="form-control" required>
            </div>
            <div class="col-md-6 form-group">
                <label for="country">Country</label>
                <input type="text" name="country" id="country" class="form-control" required>
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block mt-3">Register</button>
    </form>

    <div class="auth-footer">
        <p>Already have an account? <a href="{% url 'login' %}">Login here</a></p>
    </div>
</div>
{% endblock %}
