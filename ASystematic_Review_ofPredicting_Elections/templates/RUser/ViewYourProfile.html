{% extends 'RUser/design.html' %}
{% block content %}

<div class="container" style="margin-top: 50px;">
    <h2 class="text-center">Your Profile Details</h2>
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4 shadow-sm">
                <table class="table table-bordered">
                    <tr>
                        <th>Username</th>
                        <td>{{ object.username }}</td>
                    </tr>
                    <tr>
                        <th>Email</th>
                        <td>{{ object.email }}</td>
                    </tr>
                    <tr>
                        <th>Phone Number</th>
                        <td>{{ object.phoneno }}</td>
                    </tr>
                    <tr>
                        <th>Country</th>
                        <td>{{ object.country }}</td>
                    </tr>
                    <tr>
                        <th>State</th>
                        <td>{{ object.state }}</td>
                    </tr>
                    <tr>
                        <th>City</th>
                        <td>{{ object.city }}</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
</div>

{% endblock %}
